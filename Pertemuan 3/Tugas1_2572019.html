<body bgcolor="#b7eff7">  
    <h1 align="center">Form Pengisian Kepuasan Pembelajaran Web</h1>
    <hr width="95%" color="#75d3de">
    <form align="center">
        <h3>Nama</h3>
        <input type="text"> <br>
        <h3>NRP</h3>
        <input type="number"> <br>
        <h3>Berikan Nilai Kepuasan</h3>
        <input type="radio" name="kepuasan" value="1">1&starf;
        <input type="radio" name="kepuasan" value="2">2&starf;
        <input type="radio" name="kepuasan" value="3">3&starf;
        <input type="radio" name="kepuasan" value="4">4&starf;
        <input type="radio" name="kepuasan" value="5">5&starf;
        <br>
        <h3>Sintaks yang dipelajari</h3>
        <select name="select1">
            <option value="0" align="center"> --Pilih-- </option>
            <option value="1" align="center"> 1. Sintaks Data </option>
            <option value="2" align="center"> 2. Struktur Data </option>
            <option value="3" align="center"> 3. OOP (Object-Oriented Programming) </option>
            <option value="4" align="center"> 4. Algoritma </option>
            <option value="5" align="center"> 5. Database </option>
        </select>
        <h3>Bahasa Pemrograman Yang Digunakan</h3>
        <input type="checkbox" name="bahasa" value="1">HTML
        <input type="checkbox" name="bahasa" value="2">JavaScript
        <input type="checkbox" name="bahasa" value="3">Python
        <input type="checkbox" name="bahasa" value="4">Java
        <input type="checkbox" name="bahasa" value="5">PHP
        <br> <br>
        Keterangan
        <br> <br>
        <textarea rows="10" cols="50" placeholder="Masukkan keterangan mengenai bahasa pemrograman yang Anda gunakan."></textarea>
        <br><br>
        <input type="button" value="Submit" onclick="submit ()">
    </form>
