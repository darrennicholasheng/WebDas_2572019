<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card - 2572019</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pembungkus">
        
    <!-- position: relative - kartu produk utama -->
        <div class="kartu-produk">

            <!--position: relative - area gambar produk-->
            <div class="kotak-gambar">
                <span class="ikon-produk">&#127911</span>
                
                <!--position: absolute - pojok kiri atas-->
                <div class="label-diskon">-30%</div>

                <!--position: absolute - pojok kanan atas-->
                <div class="label-baru">Baru</div>

                <!--position: absolute - pojok kiri bawah-->
                <div class="badge-terjual">&#128722; 1.2rb terjual</div>
            </div>
            
            <!--Info produk-->
            <div class="info-produk">
                <div class="nama-produk">Headphone Pro X200</div>

                <!-- Harga berdampingan pakai float -->
                <div class="baris-harga">
                    <span class="harga-diskon">Rp 349.000</span>
                    <span class="harga-asli"><s>Rp 499.000</s></span>
                </div>

                <!-- Rating berdampingan pakai float -->
                <div class="baris-rating">
                    <span class="bintang">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
                    <span class="jumlah-ulasan">(128 ulasan)</span>
                </div>

                <!-- Tombol Keranjang -->
                <button class="tombol-keranjang">+ Tambah ke Keranjang</button>
            </div>
        </div>
    </div>

</body>
</html>
