<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index2</title>
    <style>
        ul {
            list-style-type: none;
            margin: 0;
            padding: 20px;
            width: 800px;
            background-color: red;
        }

        li {
            display: inline;
            padding: 20px 20px;
        }

        li:hover {
            background-color: black;
            color: white;
        }

    </style>
</head>
<body>
    
    <ul>
        <li>List 1</li>
        <li>List 2</li>
        <li>List 3</li>
        <li>List 4</li>
        <li>List 5</li>
    </ul>
    <br><br><br><br><br><br>

</body>
</html>
